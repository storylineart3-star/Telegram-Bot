<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Storyline Art Studio Reader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #999999);
            --link: var(--tg-theme-link-color, #248bcf);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f4);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
        }
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--secondary-bg);
        }
        .container { padding: 15px; }
        .novel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .novel-card {
            background: var(--secondary-bg);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .novel-card:active { transform: scale(0.98); }
        .novel-cover {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #ddd;
        }
        .novel-info { padding: 10px; }
        .novel-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .novel-meta { font-size: 11px; color: var(--hint); }

        /* Chapter List View */
        .chapter-item {
            padding: 15px;
            border-bottom: 1px solid var(--secondary-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: var(--text);
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--link);
            font-size: 16px;
            padding: 10px 0;
            cursor: pointer;
            display: none;
        }
        #loading { text-align: center; padding: 40px; color: var(--hint); }
    </style>
</head>
<body>

<div class="container">
    <button id="backBtn" class="back-btn" onclick="showNovels()">⬅ Back to Library</button>
    <h2 id="viewTitle">Library</h2>
    
    <div id="loading">Connecting to Storyline Art Studio...</div>
    <div id="mainContent" class="novel-grid"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // Opens app to full height
    tg.ready();

    const API_BASE = "https://storylineartstudio.in/wp-json/wp/v2";
    const NOVELS_PARENT_ID = 14; 

    // View State
    async function showNovels() {
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('viewTitle').innerText = "Library";
        const content = document.getElementById('mainContent');
        content.innerHTML = '';
        document.getElementById('loading').style.display = 'block';
        content.className = 'novel-grid';

        try {
            // Fetch subcategories (Individual Novels)
            const response = await fetch(`${API_BASE}/categories?parent=${NOVELS_PARENT_ID}&per_page=100`);
            const novels = await response.json();
            
            document.getElementById('loading').style.display = 'none';
            
            novels.forEach(novel => {
                const card = document.createElement('div');
                card.className = 'novel-card';
                card.onclick = () => showChapters(novel.id, novel.name);
                
                // Note: Categories don't have featured images by default in WP.
                // We'll use a placeholder or you can use a plugin to add category images.
                card.innerHTML = `
                    <div class="novel-info">
                        <div class="novel-title">${novel.name}</div>
                        <div class="novel-meta">${novel.count} Chapters</div>
                    </div>
                `;
                content.appendChild(card);
            });
        } catch (e) {
            document.getElementById('loading').innerText = "Error loading novels. Check CORS settings.";
        }
    }

    async function showChapters(novelId, novelName) {
        document.getElementById('backBtn').style.display = 'block';
        document.getElementById('viewTitle').innerText = novelName;
        const content = document.getElementById('mainContent');
        content.innerHTML = '';
        document.getElementById('loading').style.display = 'block';
        content.className = ''; // Remove grid for list view

        try {
            // Fetch posts in this category
            const response = await fetch(`${API_BASE}/posts?categories=${novelId}&per_page=50`);
            const chapters = await response.json();
            
            document.getElementById('loading').style.display = 'none';
            
            chapters.forEach(chap => {
                const item = document.createElement('div');
                item.className = 'chapter-item';
                item.onclick = () => tg.openLink(chap.link);
                
                // Here we use the custom field 'featured_image_url' we added to functions.php
                const thumb = chap.featured_image_url ? `<img src="${chap.featured_image_url}" style="width:40px;height:40px;border-radius:4px;margin-right:10px;object-fit:cover;">` : '';
                
                item.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        ${thumb}
                        <div>${chap.title.rendered}</div>
                    </div>
                    <span style="color:var(--link)">Read ↗</span>
                `;
                content.appendChild(item);
            });
        } catch (e) {
            document.getElementById('loading').innerText = "Error loading chapters.";
        }
    }

    // Initialize
    showNovels();
</script>

</body>
</html>
