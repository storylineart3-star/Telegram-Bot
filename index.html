<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Storyline Art Studio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f1014; --card: #1a1c22; --text: #ffffff; --accent: #ff3b5c; --hint: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        .header { position: sticky; top: 0; background: var(--bg); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #222; z-index: 10; }
        .back-btn { background: none; border: none; font-size: 24px; color: var(--accent); display: none; margin-right: 15px; cursor: pointer; }
        .header-title { font-size: 18px; font-weight: bold; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .container { padding: 12px; }
        .novel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .novel-card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #222; }
        .novel-cover { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; }
        .novel-info { padding: 10px; text-align: left; }
        .novel-title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 4px; }
        .novel-count { font-size: 11px; color: var(--accent); font-weight: bold; }
        .chapter-list { display: flex; flex-direction: column; gap: 8px; }
        .chapter-item { background: var(--card); padding: 14px; border-radius: 10px; display: flex; align-items: center; cursor: pointer; border: 1px solid #222; }
        .chap-num { color: var(--accent); font-weight: bold; margin-right: 15px; font-size: 13px; min-width: 35px; }
        .chap-title { font-size: 14px; flex: 1; color: #e0e0e0; }
        #loading { text-align: center; margin-top: 50px; color: var(--hint); font-size: 14px; }
    </style>
</head>
<body>
<div class="header">
    <button id="backBtn" class="back-btn" onclick="showNovels()">‹</button>
    <h1 id="viewTitle" class="header-title">Storyline</h1>
</div>
<div class="container">
    <div id="loading">Updating Library...</div>
    <div id="mainContent"></div>
</div>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const API = "https://storylineartstudio.in/wp-json/wp/v2";
    const PARENT_ID = 14;

    async function showNovels() {
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('viewTitle').innerText = "Library";
        const content = document.getElementById('mainContent');
        content.innerHTML = ''; content.className = 'novel-grid';
        document.getElementById('loading').style.display = 'block';
        try {
            const res = await fetch(`${API}/categories?parent=${PARENT_ID}&per_page=100`);
            const novels = await res.json();
            document.getElementById('loading').style.display = 'none';
            novels.forEach(n => {
                const card = document.createElement('div');
                card.className = 'novel-card';
                card.onclick = () => showChapters(n.id, n.name);
                const img = n.cover_url || 'https://via.placeholder.com/200x300?text=Novel';
                card.innerHTML = `<img src="${img}" class="novel-cover"><div class="novel-info"><div class="novel-title">${n.name}</div><div class="novel-count">${n.count} CHS</div></div>`;
                content.appendChild(card);
            });
        } catch (e) { document.getElementById('loading').innerText = "Connection Error"; }
    }

    async function showChapters(id, name) {
        document.getElementById('backBtn').style.display = 'block';
        document.getElementById('viewTitle').innerText = name;
        const content = document.getElementById('mainContent');
        content.innerHTML = ''; content.className = 'chapter-list';
        document.getElementById('loading').style.display = 'block';
        try {
            const res = await fetch(`${API}/posts?categories=${id}&per_page=100&order=asc`);
            const chaps = await res.json();
            document.getElementById('loading').style.display = 'none';
            chaps.forEach(c => {
                const item = document.createElement('div');
                item.className = 'chapter-item';
                item.onclick = () => tg.openLink(c.link);
                const num = c.chapter_number ? `CH ${c.chapter_number}` : 'CH';
                item.innerHTML = `<span class="chap-num">${num}</span><span class="chap-title">${c.title.rendered}</span>`;
                content.appendChild(item);
            });
        } catch (e) { document.getElementById('loading').innerText = "Error loading chapters."; }
    }
    showNovels();
</script>
</body>
</html>
